<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Blue Haven RP</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:       #FF8A4D;
      --accent-dim:   rgba(255,138,77,0.18);
      --accent-glow:  rgba(255,138,77,0.45);
      --bg:           #060810;
      --surface:      rgba(8,12,26,0.72);
      --surface-2:    rgba(255,255,255,0.04);
      --border:       rgba(255,138,77,0.22);
      --border-sub:   rgba(255,255,255,0.07);
      --text:         #e8e4dc;
      --text-dim:     rgba(232,228,220,0.5);
      --text-faint:   rgba(232,228,220,0.28);
      --navy:         #0b0f1e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: default;
      user-select: none;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      animation: grainShift 0.8s steps(2) infinite;
    }
    @keyframes grainShift {
      0%  { transform: translate(0,0); }
      25% { transform: translate(-2px,1px); }
      50% { transform: translate(2px,-1px); }
      75% { transform: translate(-1px,2px); }
      100%{ transform: translate(0,0); }
    }

    /* ── BACKGROUND ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
    }
    #bg-img {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0;
      transition: opacity 2s ease;
      animation: bgBreath 20s ease-in-out infinite alternate;
    }
    @keyframes bgBreath {
      0%   { transform: scale(1.00); }
      100% { transform: scale(1.06); }
    }
    #bg-img.loaded { opacity: 1; }

    /* Vignette */
    #bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(6,8,16,0.65) 100%),
        linear-gradient(to right, rgba(6,8,16,0.85) 0%, transparent 30%, transparent 70%, rgba(6,8,16,0.85) 100%),
        linear-gradient(to bottom, rgba(6,8,16,0.5) 0%, transparent 20%, transparent 75%, rgba(6,8,16,0.95) 100%);
    }

    /* ── SCAN LINE ── */
    #scanline {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* ── MAIN LAYOUT ── */
    #app {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── TOP BAR ── */
    #top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 36px 0;
      flex-shrink: 0;
    }
    #brand {
      display: flex; align-items: center; gap: 14px;
      animation: slideDown 0.7s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #brand-logo {
      width: 46px; height: 46px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid var(--border);
      box-shadow: 0 0 18px var(--accent-glow), 0 0 40px rgba(255,138,77,0.15);
      flex-shrink: 0;
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 18px var(--accent-glow), 0 0 40px rgba(255,138,77,0.15); }
      50%       { box-shadow: 0 0 28px var(--accent-glow), 0 0 60px rgba(255,138,77,0.25); }
    }
    #brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    #brand-text { display: flex; flex-direction: column; gap: 1px; }
    #brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 0.18em;
      color: var(--text); line-height: 1;
    }
    #brand-sub {
      font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent); font-weight: 500;
    }

    #status-bar {
      display: flex; align-items: center; gap: 20px;
      animation: slideDown 0.7s cubic-bezier(0.16,1,0.3,1) 0.6s both;
    }
    .status-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; letter-spacing: 0.08em; color: var(--text-dim);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.8);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── MIDDLE AREA ── */
    #middle {
      flex: 1; display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px;
      min-height: 0;
    }

    /* Left: Hero text */
    #hero {
      display: flex; flex-direction: column;
      max-width: 420px;
      animation: slideRight 0.8s cubic-bezier(0.16,1,0.3,1) 0.7s both;
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    #hero-eyebrow {
      font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px; font-weight: 500;
    }
    #hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 5.5vw, 78px);
      font-weight: 300; line-height: 0.95;
      color: var(--text); letter-spacing: -0.01em;
    }
    #hero-title em { font-style: italic; color: var(--accent); }
    #hero-divider {
      width: 48px; height: 1px;
      background: linear-gradient(to right, var(--accent), transparent);
      margin: 18px 0;
    }
    #hero-tagline {
      font-size: 13px; line-height: 1.65; color: var(--text-dim);
      font-weight: 300; max-width: 320px;
    }

    /* ── SIDEBAR PANEL ── */
    #panel {
      width: 360px; height: clamp(340px, 56vh, 520px);
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.04) inset;
      animation: slideLeft 0.8s cubic-bezier(0.16,1,0.3,1) 0.8s both;
    }
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Tab nav */
    #tabs {
      display: flex; border-bottom: 1px solid var(--border-sub);
      flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 0;
      padding: 13px 6px 11px;
      border: none; background: transparent; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-faint); font-weight: 500;
      transition: color 0.2s, background 0.2s;
      position: relative; white-space: nowrap;
    }
    .tab-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 0; height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      transition: width 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { width: 80%; }
    .tab-btn:hover:not(.active) { color: var(--text-dim); background: var(--surface-2); }

    /* Tab content */
    #tab-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 20px; min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,138,77,0.25) transparent;
    }
    #tab-content::-webkit-scrollbar { width: 3px; }
    #tab-content::-webkit-scrollbar-thumb { background: rgba(255,138,77,0.3); border-radius: 2px; }

    .tab-pane { display: none; animation: paneIn 0.3s ease both; }
    .tab-pane.active { display: block; }
    @keyframes paneIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RULES TAB ── */
    .rule-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-sub);
    }
    .rule-item:last-child { border-bottom: none; }
    .rule-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; color: var(--accent); line-height: 1;
      flex-shrink: 0; min-width: 24px;
    }
    .rule-text { font-size: 12px; line-height: 1.65; color: var(--text-dim); }

    /* ── TEAM TAB ── */
    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .team-card {
      background: var(--surface-2);
      border: 1px solid var(--border-sub);
      border-radius: 10px; padding: 14px;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .team-card:hover { border-color: var(--border); background: rgba(255,138,77,0.05); }
    .team-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; border: 1.5px solid var(--border);
    }
    .team-avatar-placeholder {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--surface-2); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue'; font-size: 22px; color: var(--accent);
    }
    .team-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .team-role {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent);
    }

    /* ── UPDATES TAB ── */
    .update-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border-sub);
    }
    .update-item:last-child { border-bottom: none; }
    .update-bullet {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 5px;
    }
    .update-text { font-size: 12px; line-height: 1.6; color: var(--text-dim); }

    /* ── KEYS TAB ── */
    .key-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--border-sub);
    }
    .key-item:last-child { border-bottom: none; }
    .key-badge {
      background: rgba(255,138,77,0.12);
      border: 1px solid rgba(255,138,77,0.35);
      border-radius: 5px; padding: 3px 9px;
      font-family: 'Bebas Neue'; font-size: 14px; letter-spacing: 0.08em;
      color: var(--accent); flex-shrink: 0;
    }
    .key-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .key-action { font-size: 11px; color: var(--text-dim); }
    .key-context {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-faint);
    }

    /* ── GALLERY TAB ── */
    .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .gallery-item {
      aspect-ratio: 16/10; border-radius: 7px; overflow: hidden;
      cursor: pointer; position: relative;
    }
    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.06); }
    .gallery-item::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(6,8,16,0.4), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .gallery-item:hover::after { opacity: 1; }

    /* Gallery lightbox */
    #lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(6,8,16,0.92);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #lightbox.open { opacity: 1; pointer-events: all; }
    #lightbox img {
      max-width: 85vw; max-height: 85vh;
      border-radius: 8px; border: 1px solid var(--border);
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }
    #lightbox-close {
      position: absolute; top: 28px; right: 36px;
      font-size: 28px; color: var(--text-dim); cursor: pointer;
      transition: color 0.2s; background: none; border: none; line-height: 1;
    }
    #lightbox-close:hover { color: var(--accent); }

    /* ── MUSIC TAB ── */
    .music-track {
      display: flex; align-items: center; gap: 12px;
      padding: 10px; border-radius: 8px; cursor: pointer;
      transition: background 0.2s; border: 1px solid transparent;
    }
    .music-track:hover { background: var(--surface-2); border-color: var(--border-sub); }
    .music-track.playing { background: var(--accent-dim); border-color: var(--border); }
    .track-num {
      width: 20px; text-align: center;
      font-size: 11px; color: var(--text-faint); flex-shrink: 0;
    }
    .music-track.playing .track-num { color: var(--accent); }
    .track-info { flex: 1; min-width: 0; }
    .track-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
    .track-bars {
      display: flex; align-items: flex-end; gap: 2px; height: 16px; flex-shrink: 0;
      visibility: hidden;
    }
    .music-track.playing .track-bars { visibility: visible; }
    .bar { width: 3px; background: var(--accent); border-radius: 1px; animation: bar 0.8s ease-in-out infinite alternate; }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: 0.15s; }
    .bar:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bar { from { height: 4px; } to { height: 14px; } }

    /* Music controls */
    #music-controls {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 16px;
      background: var(--surface-2); border: 1px solid var(--border-sub);
      border-radius: 10px; padding: 14px;
    }
    #music-now-playing {
      font-size: 11px; color: var(--accent);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px;
    }
    #music-track-name { font-size: 13px; font-weight: 500; color: var(--text); }
    #music-track-artist { font-size: 11px; color: var(--text-faint); }
    #music-buttons { display: flex; align-items: center; gap: 10px; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 18px;
      transition: color 0.2s; padding: 2px;
    }
    .ctrl-btn:hover { color: var(--accent); }
    .ctrl-btn.primary {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .ctrl-btn.primary:hover { transform: scale(1.08); box-shadow: 0 0 24px var(--accent-glow); }
    #volume-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; background: var(--border-sub);
      border-radius: 2px; cursor: pointer; outline: none;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent-glow);
    }

    /* Socials row */
    #socials-row {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 14px 20px; border-top: 1px solid var(--border-sub);
      flex-shrink: 0;
    }
    .social-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px; background: var(--surface-2);
      border: 1px solid var(--border-sub); border-radius: 8px;
      color: var(--text-dim); font-size: 11px; letter-spacing: 0.06em;
      cursor: pointer; text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .social-btn:hover { border-color: var(--border); color: var(--text); background: rgba(255,255,255,0.05); }
    .social-icon { font-size: 14px; }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      padding: 16px 36px 22px;
      display: flex; flex-direction: column; gap: 10px;
      flex-shrink: 0;
      animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 1s both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #progress-track {
      position: relative; height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(to right, var(--accent), #ffb347);
      border-radius: 2px;
      transition: width 0.4s ease;
      position: relative;
    }
    #progress-fill::after {
      content: '';
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: #ffb347; box-shadow: 0 0 10px #ffb347;
    }
    #progress-meta { display: flex; justify-content: space-between; align-items: center; }
    #progress-label {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-faint);
    }
    #progress-pct {
      font-family: 'Bebas Neue'; font-size: 16px;
      color: var(--accent); letter-spacing: 0.08em;
    }

    /* ── FADE OUT OVERLAY (used on shutdown) ── */
    #transition {
      position: fixed; inset: 0; z-index: 800;
      background: var(--bg); opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #transition.fade-out { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<!-- Background -->
<div id="bg-layer">
  <div id="bg-img"></div>
</div>
<div id="scanline"></div>

<!-- Fade overlay (shutdown) -->
<div id="transition"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">&#215;</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- Main App -->
<div id="app">

  <!-- Top bar -->
  <div id="top-bar">
    <div id="brand">
      <div id="brand-logo">
        <img id="brand-logo-img" src="./Logo.png" alt="Blue Haven RP" />
      </div>
      <div id="brand-text">
        <div id="brand-name">Blue Haven</div>
        <div id="brand-sub">Roleplay Server</div>
      </div>
    </div>
    <div id="status-bar">
      <div class="status-item">
        <div class="status-dot"></div>
        <span>Server Online</span>
      </div>
      <div class="status-item" style="color:var(--text-faint); font-size:10px; letter-spacing:0.15em;">
        FiveM &bull; QBCore
      </div>
    </div>
  </div>

  <!-- Middle -->
  <div id="middle">

    <!-- Hero -->
    <div id="hero">
      <div id="hero-eyebrow">Welcome Aboard</div>
      <div id="hero-title">Blue Haven<br><em>RolePlay</em></div>
      <div id="hero-divider"></div>
      <div id="hero-tagline">Your flight is landing. Buckle up &mdash; the city doesn't sleep and neither does the opportunity waiting for you.</div>
    </div>

    <!-- Panel -->
    <div id="panel">
      <div id="tabs">
        <button class="tab-btn active" data-tab="rules">Rules</button>
        <button class="tab-btn" data-tab="team">Team</button>
        <button class="tab-btn" data-tab="updates">Updates</button>
        <button class="tab-btn" data-tab="keys">Keys</button>
        <button class="tab-btn" data-tab="gallery">Gallery</button>
        <button class="tab-btn" data-tab="music">Music</button>
      </div>

      <div id="tab-content">
        <div class="tab-pane active" id="pane-rules"><div id="rules-list"></div></div>
        <div class="tab-pane" id="pane-team"><div class="team-grid" id="team-grid"></div></div>
        <div class="tab-pane" id="pane-updates"><div id="updates-list"></div></div>
        <div class="tab-pane" id="pane-keys"><div id="keys-list"></div></div>

// ═══════════════════════════════════════════════════════════════
// DEEP MERGE UTILITY
// Properly merges config.json into defaults so nested arrays
// (gallery, music, rules, teamMembers, etc.) are replaced in full
// rather than silently ignored by a shallow Object.assign
// ═══════════════════════════════════════════════════════════════
function deepMerge(base, override) {
  const result = Object.assign({}, base);
  for (const key of Object.keys(override)) {
    const val = override[key];
    // Arrays replace entirely (don't merge element-by-element)
    if (Array.isArray(val)) {
      result[key] = val;
    } else if (val !== null && typeof val === 'object' && typeof base[key] === 'object' && !Array.isArray(base[key])) {
      result[key] = deepMerge(base[key], val);
    } else {
      result[key] = val;
    }
  }
  return result;
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let cfg = DEFAULT_CONFIG;
let loadProgress    = 0;
let targetProgress  = 0;
let progressAnimFrame = null;
const audioPlayer   = document.getElementById('audio-player');
let currentTrack    = -1;
let isPlaying       = false;
let shutdownHandled = false;

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init() {
  try {
    const res = await fetch('./config.json');
    if (res.ok) {
      const fileData = await res.json();
      cfg = deepMerge(DEFAULT_CONFIG, fileData);
    }
  } catch(_) {
    // config.json not available — use defaults (fine)
  }

  applyAccent(cfg.selectedColor || '#FF8A4D');
  applyBackground();
  applyWatermark();
  renderRules();
  renderTeam();
  renderUpdates();
  renderKeys();
  renderGallery();
  renderMusic();
  renderSocials();
  setupTabs();
  setupLightbox();
  setupAudio();
  autoPlayFirst();
  startProgressSim();
  listenFiveM();
}

// ═══════════════════════════════════════════════════════════════
// ACCENT COLOUR
// ═══════════════════════════════════════════════════════════════
function applyAccent(hex) {
  // Ensure hex is valid before parsing
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  document.documentElement.style.setProperty('--accent',      hex);
  document.documentElement.style.setProperty('--accent-dim',  `rgba(${r},${g},${b},0.18)`);
  document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.45)`);
  document.documentElement.style.setProperty('--border',      `rgba(${r},${g},${b},0.22)`);
}

// ═══════════════════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════════════════
function applyBackground() {
  const bgImg = document.getElementById('bg-img');
  const src   = cfg.backgroundImage;
  if (!src) return;
  const img   = new Image();
  img.onload  = () => { bgImg.style.backgroundImage = `url('${src}')`; bgImg.classList.add('loaded'); };
  img.onerror = () => {};
  img.src     = src;
}

// ═══════════════════════════════════════════════════════════════
// WATERMARK / BRANDING — driven by config.json watermark block
// ═══════════════════════════════════════════════════════════════
function applyWatermark() {
  const w = cfg.watermark;
  if (!w) return;

  // Logo image
  if (w.logo) {
    document.getElementById('brand-logo-img').src = w.logo;
  }

  // Brand name text — optionally colour the first N words in accent
  if (w.label && w.label.text) {
    const words  = w.label.text.split(' ');
    const colorN = w.label.colorWordCount || 0;
    const nameEl = document.getElementById('brand-name');

    nameEl.innerHTML = words.map((word, i) =>
      i < colorN ? `<span style="color:var(--accent)">${word}</span>` : word
    ).join(' ');

    document.getElementById('hero-title').innerHTML =
      words.slice(0, colorN).join(' ') +
      (colorN < words.length ? `<br><em>${words.slice(colorN).join(' ')}</em>` : '');
  }

  if (w.subHeading) {
    document.getElementById('brand-sub').textContent = w.subHeading;
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function renderRules() {
  document.getElementById('rules-list').innerHTML =
    (cfg.rules || []).map((r, i) => `
      <div class="rule-item">
        <div class="rule-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="rule-text">${r}</div>
      </div>
    `).join('');
}

function renderTeam() {
  document.getElementById('team-grid').innerHTML =
    (cfg.teamMembers || []).map(m => {
      const initials   = m.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const avatarHtml = m.image
        ? `<img class="team-avatar" src="${m.image}" alt="${m.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
           <div class="team-avatar-placeholder" style="display:none">${initials}</div>`
        : `<div class="team-avatar-placeholder">${initials}</div>`;
      return `<div class="team-card">${avatarHtml}<div class="team-name">${m.name}</div><div class="team-role">${m.role}</div></div>`;
    }).join('');
}

function renderUpdates() {
  const panel = (cfg.customPanels || []).find(p => p.uniqueId === 'updates') || { entries: [] };
  document.getElementById('updates-list').innerHTML =
    (panel.entries || []).map(e => `
      <div class="update-item">
        <div class="update-bullet"></div>
        <div class="update-text">${e}</div>
      </div>
    `).join('');
}

function renderKeys() {
  const keys = (cfg.keyboardShortcuts && cfg.keyboardShortcuts.keys) || [];
  document.getElementById('keys-list').innerHTML =
    keys.map(k => {
      const actions = [];
      if (k.onFoot) actions.push(`<div class="key-action">${k.onFoot}</div><div class="key-context">On Foot</div>`);
      if (k.inCar)  actions.push(`<div class="key-action">${k.inCar}</div><div class="key-context">In Vehicle</div>`);
      return `
        <div class="key-item">
          <div class="key-badge">${k.key}</div>
          <div class="key-actions">${actions.join('')}</div>
        </div>
      `;
    }).join('');
}

function renderGallery() {
  document.getElementById('gallery-grid').innerHTML =

      <div class="gallery-item" data-index="${i}">
        <img src="${g.path}" alt="Gallery ${i + 1}" loading="lazy" />
      </div>

function renderSocials() {
  const el      = document.getElementById('socials-row');
  const socials = (cfg.socialHeaders || []).filter(s => s.enabled);
  if (!socials.length) { el.style.display = 'none'; return; }
  const icons   = { discord: '💬', twitter: '🐦', tiktok: '🎵', instagram: '📷', youtube: '▶️' };
  el.innerHTML  = socials.map(s => `

      <span class="social-icon">${icons[s.type] || '🔗'}</span>

function renderMusic() {
  const tracks = cfg.music || [];
  document.getElementById('tracks-list').innerHTML =
    tracks.map((t, i) => `
      <div class="music-track" data-index="${i}">
        <div class="track-num">${i + 1}</div>
        <div class="track-info">
          <div class="track-title">${t.title}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
        <div class="track-bars">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
      </div>
    `).join('');
  document.querySelectorAll('.music-track').forEach(el => {
    el.addEventListener('click', () => playTrack(+el.dataset.index));
  });

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const pane = document.getElementById('pane-' + btn.dataset.tab);
      if (pane) pane.classList.add('active');
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════════════════
function setupLightbox() {
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  document.getElementById('gallery-grid').addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (!item) return;
    lbImg.src = cfg.gallery[+item.dataset.index].path;
    lb.classList.add('open');
  });
  document.getElementById('lightbox-close').addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
}

// ═══════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════
function setupAudio() {
  audioPlayer.volume = cfg.defaultVolume ?? 1;
  document.getElementById('volume-slider').value = audioPlayer.volume;

  document.getElementById('btn-play').addEventListener('click', () => {
    if (currentTrack < 0) { playTrack(0); return; }
    if (isPlaying) pauseAudio(); else resumeAudio();
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    playTrack((currentTrack + 1) % (cfg.music || []).length);
  });
  document.getElementById('btn-prev').addEventListener('click', () => {
    const tracks = cfg.music || [];
    playTrack((currentTrack - 1 + tracks.length) % tracks.length);
  });
  document.getElementById('volume-slider').addEventListener('input', e => {
    audioPlayer.volume = +e.target.value;
  });
  audioPlayer.addEventListener('ended', () => {
    playTrack((currentTrack + 1) % (cfg.music || []).length);
  });
}

function playTrack(idx) {
  const tracks = cfg.music || [];
  if (!tracks[idx]) return;
  currentTrack = idx;
  isPlaying    = true;
  audioPlayer.src = tracks[idx].path;
  audioPlayer.play().catch(() => {});
  document.getElementById('music-track-name').textContent   = tracks[idx].title;
  document.getElementById('music-track-artist').textContent = tracks[idx].artist;
  document.getElementById('btn-play').innerHTML = '&#9646;&#9646;';
  document.querySelectorAll('.music-track').forEach((el, i) => {
    el.classList.toggle('playing', i === idx);
  });
}

function pauseAudio()  { isPlaying = false; audioPlayer.pause(); document.getElementById('btn-play').innerHTML = '&#9654;'; }
function resumeAudio() { isPlaying = true;  audioPlayer.play().catch(() => {}); document.getElementById('btn-play').innerHTML = '&#9646;&#9646;'; }

// ═══════════════════════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════════════════════
const PROGRESS_LABELS = [
  'Connecting to server…',
  'Streaming assets…',
  'Loading world…',
  'Initialising scripts…',
  'Almost there…',
  'Preparing your arrival…'
];

function setProgress(pct, label) {
  targetProgress = Math.min(pct, 100);
  if (label) document.getElementById('progress-label').textContent = label;
  animProgress();
}

function animProgress() {
  if (progressAnimFrame) cancelAnimationFrame(progressAnimFrame);
  const step = () => {
    if (loadProgress < targetProgress) {
      loadProgress = Math.min(loadProgress + 0.8, targetProgress);
      document.getElementById('progress-fill').style.width = loadProgress + '%';
      document.getElementById('progress-pct').textContent  = Math.round(loadProgress) + '%';
      progressAnimFrame = requestAnimationFrame(step);
    }
  };
  progressAnimFrame = requestAnimationFrame(step);
}

function startProgressSim() {
  const steps = [
    [800,  10, PROGRESS_LABELS[0]],
    [2000, 28, PROGRESS_LABELS[1]],
    [4500, 55, PROGRESS_LABELS[2]],
    [7000, 72, PROGRESS_LABELS[3]],
    [9500, 88, PROGRESS_LABELS[4]],
  ];
  steps.forEach(([delay, pct, label]) => {
    setTimeout(() => { if (loadProgress < pct) setProgress(pct, label); }, delay);
  });
}

// ═══════════════════════════════════════════════════════════════
// FIVEM EVENT BRIDGE
// ═══════════════════════════════════════════════════════════════
function listenFiveM() {
  window.addEventListener('message', e => {
    const data = e.data;
    if (!data) return;

    // FiveM real loading progress
    if (data.eventName === 'loadProgress' || data.type === 'loadProgress') {
      const pct   = data.loadFraction ? data.loadFraction * 100 : (data.percent || 0);
      const label = PROGRESS_LABELS[Math.floor(pct / 20)] || PROGRESS_LABELS[4];
      setProgress(pct, label);
    }

    // FiveM signals loading is complete — trigger cinematic handoff
    if (
      data.eventName === 'loadingScreenHide' ||
      data.type      === 'loadingScreenHide' ||
      data.eventName === 'shutdown' ||
      data.shutdown  === true
    ) {
      handleLoadComplete();
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// LOAD COMPLETE → DISMISS LOADING SCREEN
// ═══════════════════════════════════════════════════════════════
function handleLoadComplete() {
  if (shutdownHandled) return;
  shutdownHandled = true;

  setProgress(100, 'Ready');

  setTimeout(() => {
    // Fade the screen to black before handing off to the game
    document.getElementById('transition').classList.add('fade-out');

    setTimeout(() => {
      if (typeof window.invokeNative !== 'undefined') {
        window.invokeNative('shutdown', '');
      }
    }, 800);
  }, 600);
}

// ═══════════════════════════════════════════════════════════════
// AUTO-PLAY — starts track 0 as soon as the page loads
// ═══════════════════════════════════════════════════════════════
function autoPlayFirst() {
  const tracks = cfg.music || [];
  if (!tracks.length) return;

  // Attempt immediate play (works in FiveM CEF)
  playTrack(0);

  // Fallback: if browser blocks autoplay, play on first user gesture
  if (!isPlaying) {
    const unlock = () => {
      if (!isPlaying) playTrack(0);
      document.removeEventListener('click',   unlock);
      document.removeEventListener('keydown', unlock);
    };
    document.addEventListener('click',   unlock);
    document.addEventListener('keydown', unlock);
  }
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
init();
</script>
